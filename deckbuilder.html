<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0b0b">
  <meta name="description" content="Build Carry The Flame decks and save them locally for playtesting.">
  <title>Deck Builder — Carry The Flame</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root{--bg:#070707;--panel:#151515;--panel2:#222;--flame:#ff6a00;--ember:#ff2d00;--gold:#ffd166;--cream:#eee1cc;--white:#fff8ef;--ash:#9a948c;--line:rgba(255,106,0,.22);--bad:#e74c3c;--good:#4caf50}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#251006 0,#070707 45%,#030303 100%);color:var(--white);font-family:Arial,Helvetica,sans-serif;line-height:1.5}a{color:inherit;text-decoration:none}.wrap{max-width:1280px;margin:0 auto;padding:0 18px}header{position:sticky;top:0;z-index:20;background:rgba(5,5,5,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}.top{min-height:76px;display:flex;align-items:center;justify-content:space-between;gap:18px}.brand{display:flex;gap:12px;align-items:center;font-weight:900;text-transform:uppercase;letter-spacing:.7px}.brand .torch{font-size:30px;filter:drop-shadow(0 0 14px var(--flame))}.brand small{display:block;color:var(--ash);font-size:11px;letter-spacing:1.4px}.nav{display:flex;gap:10px;flex-wrap:wrap}.nav a{font-size:12px;text-transform:uppercase;color:var(--cream);padding:9px 10px;border:1px solid rgba(255,106,0,.18);border-radius:999px;background:rgba(255,255,255,.03)}.nav a:hover,.nav a.active{border-color:var(--flame);color:#fff}.menu{display:none;background:transparent;border:1px solid rgba(255,106,0,.35);border-radius:10px;color:var(--flame);padding:10px 12px;font-weight:900}
    main{padding:34px 0 48px}.hero{padding:28px 0 18px;text-align:center}.eyebrow{display:inline-flex;margin:0 0 12px;padding:7px 11px;border-radius:999px;border:1px solid rgba(255,106,0,.35);color:var(--gold);background:rgba(0,0,0,.35);font-size:12px;text-transform:uppercase;letter-spacing:1.3px}.hero h1{margin:0;text-transform:uppercase;font-size:clamp(40px,7vw,82px);line-height:.95;color:var(--flame);text-shadow:0 0 18px rgba(255,106,0,.7)}.hero p{max-width:820px;margin:16px auto;color:var(--cream);font-size:17px}.layout{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;margin-top:18px}.panel{background:rgba(10,10,10,.72);border:1px solid var(--line);border-radius:18px;padding:16px}.filters{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px;margin-bottom:12px}input,select,textarea{width:100%;padding:12px 13px;background:var(--panel2);color:var(--white);border:1px solid rgba(255,106,0,.25);border-radius:10px}input:focus,select:focus,textarea:focus{outline:2px solid rgba(255,106,0,.35)}button{border:0;border-radius:10px;padding:10px 12px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,var(--ember),var(--flame));color:#fff}.ghost{background:transparent;border:1px solid rgba(255,106,0,.35);color:var(--flame)}.list{display:grid;gap:8px;max-height:64vh;overflow:auto}.row{display:grid;grid-template-columns:56px 1fr auto;gap:10px;align-items:center;padding:10px;background:#111;border:1px solid rgba(255,106,0,.12);border-radius:12px}.thumb{width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:#050505;border:1px solid rgba(255,106,0,.18);border-radius:8px;overflow:hidden}.thumb img{max-width:42px;max-height:46px;object-fit:contain}.row strong{display:block;color:#fff}.meta{font-size:12px;color:var(--ash)}.small{font-size:12px;color:var(--ash)}.deckline{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.07)}.deckline span{font-size:14px}.status.good{color:var(--good);font-weight:900}.status.bad{color:var(--bad);font-weight:900}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}textarea{height:220px;font-family:monospace;font-size:12px}.deck-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:7px 10px;background:rgba(0,0,0,.3);color:var(--cream);font-size:12px}.embers{position:fixed;inset:auto 0 0 0;height:32vh;pointer-events:none;z-index:-1;background:radial-gradient(circle at 20% 80%,rgba(255,106,0,.18),transparent 8%),radial-gradient(circle at 55% 85%,rgba(255,45,0,.16),transparent 10%),radial-gradient(circle at 82% 78%,rgba(255,209,102,.12),transparent 8%)}footer{border-top:1px solid var(--line);padding:28px 0;color:var(--ash);text-align:center}
    @media(max-width:900px){.menu{display:block}.nav{display:none;width:100%;padding-bottom:14px}.nav.open{display:flex}.top{flex-wrap:wrap}.layout{grid-template-columns:1fr}.filters{grid-template-columns:1fr}.hero{text-align:left}.row{grid-template-columns:48px 1fr}.row button{grid-column:1/-1}}
  </style>
  <script src="assets/js/ctf-config.js"></script>
  <script src="assets/js/ctf_card_database.js"></script>
  <script src="assets/js/card-image-map.js"></script>
  <script src="assets/js/deck-utils.js"></script>
</head>
<body>
<div class="embers" aria-hidden="true"></div>
<header><div class="wrap top"><a class="brand" href="index.html"><span class="torch">🔥</span><span>Carry The Flame<small>Deck Builder</small></span></a><button class="menu" id="menuBtn" type="button">☰ Menu</button><nav class="nav" id="siteNav"><a href="index.html">Home</a><a href="cards.html">Cards</a><a class="active" href="deckbuilder.html">Deck Builder</a><a href="play.html">Play</a><a href="rules.html">Rules</a><a href="submit.html">Submit</a></nav></div></header>
<main class="wrap">
<section class="hero"><p class="eyebrow">🧱 BUILD YOUR DECK</p><h1>Deck Builder</h1><p>Search the card library, build a legal deck, save it locally, and send it straight into play mode.</p></section>
<div class="layout">
<section class="panel"><div class="filters"><input id="q" placeholder="Search cards"><select id="set"><option value="">All Sets</option></select><select id="zone"><option value="main">Add to Main</option><option value="fusion">Add to Fusion</option><option value="side">Add to Side</option></select></div><div id="cardCount" class="small"></div><div id="cards" class="list"></div></section>
<section class="panel"><div class="deck-head"><h2>Current Deck</h2><span class="pill">Main 40–60 · Fusion 0–15 · Side 0–15</span></div><input id="deckName" placeholder="Deck name" value="My CTF Deck"><div id="counts"></div><div id="validation"></div><div class="actions"><button id="saveBtn">Save Deck</button><button id="playBtn">Save + Play</button><button id="exportBtn">Export</button><button class="ghost" id="clearBtn">Clear</button></div><textarea id="exportBox" readonly placeholder="Export appears here..."></textarea></section>
</div>
</main>
<footer><div class="wrap"><p>© 2026 Perfect Timing Gaming · Carry The Flame</p></div></footer>
<script>
(function(){
 const cards=window.CTF_CARDS||window.CTF_CARD_DATABASE||[];const utils=window.CTF_DECK_UTILS;const deck={main:[],fusion:[],side:[]};
 const q=document.getElementById('q'),set=document.getElementById('set'),zone=document.getElementById('zone'),list=document.getElementById('cards'),counts=document.getElementById('counts'),validation=document.getElementById('validation'),exportBox=document.getElementById('exportBox'),cardCount=document.getElementById('cardCount'),deckName=document.getElementById('deckName');
 const fallbackSvg='data:image/svg+xml;utf8,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="120" height="160" viewBox="0 0 120 160"><rect width="120" height="160" rx="14" fill="#151515"/><rect x="8" y="8" width="104" height="144" rx="10" fill="#21140b" stroke="#ff6a00" stroke-width="3"/><text x="60" y="72" text-anchor="middle" font-size="34">🔥</text><text x="60" y="100" text-anchor="middle" fill="#ffd166" font-family="Arial" font-size="12" font-weight="700">CTF</text></svg>`);
 function val(c,k){return c?.[k]??c?.[k.toUpperCase()]??''} function name(c){return val(c,'name')||'Unnamed'} function setCode(c){return String(val(c,'set')||'').toUpperCase()} function cat(c){return val(c,'category')||val(c,'group')||val(c,'type')||''} function cardNo(c){return String(val(c,'cardNumber')||val(c,'cardno')||val(c,'CARDNO')||'')} function key(c){return c.id||`${setCode(c)}::${cardNo(c)}::${name(c)}`}
 const norm=s=>String(s||'').toLowerCase().replace(/&/g,'and').replace(/['’]/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');const nospace=s=>String(s||'').toLowerCase().replace(/&/g,'and').replace(/['’]/g,'').replace(/[^a-z0-9]+/g,'');
 function imageCandidates(c){const sc=setCode(c)==='S-M'?'SH1':setCode(c);const n=name(c);let mapped=null;if(window.CTF_CARD_IMAGES){for(const k of [`${sc}::${cardNo(c)}::${n}`,`${sc}::${n}`,n,c.id].filter(Boolean)){if(window.CTF_CARD_IMAGES[k]){mapped=window.CTF_CARD_IMAGES[k];break}}}return [mapped,`images/${sc}/${norm(n)}.gif`,`images/${sc}/${nospace(n)}.gif`,`images/${sc}/${n}.gif`,fallbackSvg].filter(Boolean)}
 function imgTag(c){const imgs=imageCandidates(c);return `<img src="${imgs[0]}" data-imgs='${JSON.stringify(imgs)}' data-idx="0" alt="${name(c)}" onerror="window.ctfNextDeckImage(this)">`} window.ctfNextDeckImage=function(el){let list=[];try{list=JSON.parse(el.dataset.imgs||'[]')}catch(e){}let idx=Number(el.dataset.idx||0)+1;if(idx<list.length){el.dataset.idx=idx;el.src=list[idx]}else{el.onerror=null;el.src=fallbackSvg}};
 [...new Set(cards.map(setCode).filter(Boolean))].sort().forEach(s=>set.add(new Option(s,s))); cardCount.textContent=`Library ready: ${cards.length} cards loaded`;
 function add(c){deck[zone.value].push(c);renderDeck()} function remove(area,i){deck[area].splice(i,1);renderDeck()} window.removeDeckCard=remove;
 function saveDeck(){const payload={name:deckName.value||'My CTF Deck',savedAt:new Date().toISOString(),main:deck.main.map(key),fusion:deck.fusion.map(key),side:deck.side.map(key)};localStorage.setItem('ctf_active_deck',JSON.stringify(payload));exportBox.value='Saved deck for play:\n'+JSON.stringify(payload,null,2);return payload}
 function renderCards(){let arr=[...cards];const term=q.value.toLowerCase().trim();if(term)arr=arr.filter(c=>(name(c)+' '+cat(c)+' '+(val(c,'desc')||'')).toLowerCase().includes(term));if(set.value)arr=arr.filter(c=>setCode(c)===set.value);arr=arr.slice(0,250);list.innerHTML=arr.map((c,i)=>`<div class="row"><div class="thumb">${imgTag(c)}</div><div><strong>${name(c)}</strong><div class="meta">${setCode(c)} · ${cat(c)} · LV ${val(c,'level')||'-'} · PR ${val(c,'pressure')||val(c,'atk')||'-'} / CP ${val(c,'counterPressure')||val(c,'def')||'-'}</div></div><button data-i="${i}">Add</button></div>`).join('')||'<p class="small">No cards found.</p>';[...list.querySelectorAll('button')].forEach(b=>b.onclick=()=>add(arr[Number(b.dataset.i)]));}
 function renderDeck(){const result=utils?utils.validateDeck(deck):{legal:false,errors:['deck-utils.js not loaded'],warnings:[]};counts.innerHTML=`<p>Main: ${deck.main.length} · Fusion: ${deck.fusion.length} · Side: ${deck.side.length}</p>`+['main','fusion','side'].map(area=>`<h3>${area.toUpperCase()}</h3>`+deck[area].map((c,i)=>`<div class="deckline"><span>${name(c)}</span><button class="ghost" onclick="removeDeckCard('${area}',${i})">Remove</button></div>`).join('')).join('');validation.innerHTML=`<p class="status ${result.legal?'good':'bad'}">${result.legal?'Deck legal':'Deck needs fixes'}</p>`+[...result.errors,...result.warnings].map(e=>`<div class="small">• ${e}</div>`).join('');}
 document.getElementById('saveBtn').onclick=saveDeck;document.getElementById('playBtn').onclick=()=>{saveDeck();location.href='play.html?deck=local'};document.getElementById('exportBtn').onclick=()=>{exportBox.value=utils?utils.exportDeckText(deck):JSON.stringify(deck,null,2)};document.getElementById('clearBtn').onclick=()=>{deck.main=[];deck.fusion=[];deck.side=[];renderDeck()};[q,set].forEach(el=>el.addEventListener('input',renderCards));renderCards();renderDeck();document.getElementById('menuBtn')?.addEventListener('click',()=>document.getElementById('siteNav').classList.toggle('open'));
})();
</script>
<script src="https://operatorstack.dev/os.js" data-project="pk_k4xr4vnpsizd"></script>
</body></html>
