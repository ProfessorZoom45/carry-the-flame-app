<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cards — Carry The Flame</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d0d0d">
  <style>
    :root{--bg:#0d0d0d;--panel:#1a1a1a;--panel2:#242424;--flame:#ff6a00;--cream:#e8e0d0;--white:#f5f0e8;--ash:#888}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--white);font-family:Arial,sans-serif;line-height:1.5} a{color:var(--flame);text-decoration:none}
    header{padding:24px 16px;border-bottom:1px solid rgba(255,106,0,.2);background:#090909;position:sticky;top:0;z-index:10}
    .wrap{max-width:1200px;margin:0 auto}.top{display:flex;gap:14px;align-items:center;justify-content:space-between;flex-wrap:wrap}.brand{font-size:26px;font-weight:900;letter-spacing:1px;color:var(--flame);text-transform:uppercase}.nav{display:flex;gap:12px;flex-wrap:wrap}.nav a{font-size:13px;text-transform:uppercase;color:var(--cream)}
    main{padding:24px 16px}.hero{margin-bottom:20px}.hero h1{margin:0;color:var(--flame);font-size:42px;text-transform:uppercase}.hero p{color:var(--cream);max-width:760px}
    .filters{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:10px;margin:16px 0}.filters input,.filters select{padding:12px;background:var(--panel2);color:var(--white);border:1px solid rgba(255,106,0,.2);border-radius:6px}
    .stats{color:var(--ash);font-size:14px;margin:10px 0 18px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}.card{background:var(--panel);border:1px solid rgba(255,106,0,.16);border-radius:10px;padding:12px;min-height:230px}.art{height:110px;display:flex;align-items:center;justify-content:center;background:#111;border-radius:8px;border:1px solid rgba(255,106,0,.12);margin-bottom:10px}.art img{max-width:94px;max-height:94px;object-fit:contain;image-rendering:auto}.name{font-weight:900;color:var(--white);text-transform:uppercase;font-size:15px}.meta{color:var(--ash);font-size:12px;margin:6px 0}.desc{color:var(--cream);font-size:13px;max-height:70px;overflow:auto}.statsrow{display:flex;gap:10px;color:var(--flame);font-size:12px;font-weight:700;margin-top:8px}.empty{padding:36px;text-align:center;color:var(--ash);border:1px dashed rgba(255,106,0,.2);border-radius:10px}
    @media(max-width:760px){.filters{grid-template-columns:1fr}.hero h1{font-size:34px}.grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}}
  </style>
  <script defer src="assets/js/embers-bg.js"></script>
  <script src="assets/js/ctf-config.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/card-image-map.js"></script>
</head>
<body>
<header><div class="wrap top"><a class="brand" href="index.html">Carry The Flame</a><nav class="nav"><a href="index.html">Home</a><a href="cards.html">Cards</a><a href="deckbuilder.html">Deck Builder</a><a href="play.html">Play</a><a href="rules.html">Rules</a></nav></div></header>
<main class="wrap">
  <section class="hero"><h1>Card Browser</h1><p>Search and filter the Carry The Flame card pool. This testing page is safe for the staging repo and will show full data once the complete database is uploaded.</p></section>
  <section class="filters"><input id="q" placeholder="Search card name or text"><select id="set"><option value="">All Sets</option></select><select id="type"><option value="">All Types</option></select><select id="sort"><option value="name">Sort: Name</option><option value="set">Sort: Set</option><option value="level">Sort: Level</option><option value="pressure">Sort: Pressure</option></select></section>
  <div class="stats" id="stats">Loading cards...</div><section class="grid" id="grid"></section>
</main>
<script>
(function(){
 const cards = window.CTF_CARDS || window.CTF_CARD_DATABASE || [];
 const grid = document.getElementById('grid'), stats = document.getElementById('stats');
 const q = document.getElementById('q'), set = document.getElementById('set'), type = document.getElementById('type'), sort = document.getElementById('sort');
 const placeholder = 'images/placeholder.gif';
 function val(c,k){return c?.[k] ?? c?.[k.toUpperCase()] ?? ''}
 function name(c){return val(c,'name') || val(c,'card_name') || 'Unnamed Card'}
 function setCode(c){return String(val(c,'set') || val(c,'setCode') || '').toUpperCase()}
 function category(c){return val(c,'category') || val(c,'type') || val(c,'GROUP') || ''}
 function desc(c){return val(c,'desc') || val(c,'description') || ''}
 function norm(s){return String(s||'').normalize('NFKD').replace(/[\u0300-\u036f]/g,'').replace(/[’']/g,'_').replace(/[^a-zA-Z0-9]+/g,'_').replace(/_+/g,'_').replace(/^_+|_+$/g,'').toLowerCase()}
 function img(c){if(c.id && window.CTF_CARD_IMAGES && window.CTF_CARD_IMAGES[c.id]) return window.CTF_CARD_IMAGES[c.id]; const sc=setCode(c)==='S-M'?'SH1':setCode(c); return sc?`images/${sc}/${norm(name(c))}.gif`:placeholder}
 function fillOptions(){[...new Set(cards.map(setCode).filter(Boolean))].sort().forEach(s=>set.add(new Option(s,s)));[...new Set(cards.map(category).filter(Boolean))].sort().slice(0,160).forEach(t=>type.add(new Option(t,t)))}
 function render(){let list=[...cards]; const query=q.value.toLowerCase().trim(); if(query) list=list.filter(c=>(name(c)+' '+desc(c)).toLowerCase().includes(query)); if(set.value) list=list.filter(c=>setCode(c)===set.value); if(type.value) list=list.filter(c=>category(c)===type.value); list.sort((a,b)=>String(sort.value==='set'?setCode(a):sort.value==='level'?val(a,'level'):sort.value==='pressure'?(val(b,'pressure')||val(b,'atk')):name(a)).localeCompare(String(sort.value==='set'?setCode(b):sort.value==='level'?val(b,'level'):sort.value==='pressure'?(val(a,'pressure')||val(a,'atk')):name(b)))); stats.textContent=`Showing ${list.length} of ${cards.length} cards`; grid.innerHTML=list.length?list.slice(0,500).map(c=>`<article class="card"><div class="art"><img src="${img(c)}" onerror="this.onerror=null;this.src='${placeholder}'" alt="${name(c).replace(/"/g,'&quot;')}"></div><div class="name">${name(c)}</div><div class="meta">${setCode(c)} · ${category(c)}</div><div class="desc">${desc(c)}</div><div class="statsrow"><span>LV ${val(c,'level')||'-'}</span><span>PR ${val(c,'pressure')||val(c,'atk')||'-'}</span><span>CP ${val(c,'counterPressure')||val(c,'def')||'-'}</span></div></article>`).join(''):`<div class="empty">No cards found. Full database may still need upload.</div>`}
 fillOptions(); [q,set,type,sort].forEach(el=>el.addEventListener('input',render)); render();
})();
</script>
</body></html>
